name: "Terraform PR Preview Deployment"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_VAR_branch_name: ${{ github.head_ref }}
  TF_IN_AUTOMATION: true

defaults:
  run:
    working-directory: ./terraform/dev

jobs:
  deployment:
    name: "Terraform PR Preview Deployment"
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace
        run: terraform workspace select -or-create pr_${{ github.event.number }}

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -no-color

      - name: Publish Results to Step Summary
        if: always()
        run: |
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          # Terraform PR Preview Deployment

          <details open>
          <summary>Terraform Apply: ${{ steps.apply.outcome == 'success' && '✅ Passed' || '❌ Failed' }}</summary>

          \`\`\`
          ${{ steps.apply.outputs.stdout }}
          \`\`\`

          </details>
          EOF

      - name: Add Comment to PR
        if: always()
        uses: actions/github-script@v8
        with:
          script: |
            const marker = "<!-- terraform-pr-preview -->";
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `${marker}
            ## PR Preview Deployment for ${context.sha} on workspace \`pr_${{ github.event.number }}\`

            Please view test deployment here: 

            A full result of the Terraform deployment run is available in the workflow summary here: ${runUrl}
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
