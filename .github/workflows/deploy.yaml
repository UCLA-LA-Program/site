name: "Production Deployment"
on:
  push:
    branches: [main]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    name: "Terraform Production Deployment"
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Get PR
        uses: actions/github-script@v8
        id: get_pr
        with:
          script: |
            const response = await github.rest.repos.listPullRequestsAssociatedWithCommit({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
            });

            const pr = response.data.length > 0 ? response.data[0] : null;
            core.setOutput('pr_number', pr ? pr.number : '');

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.0

      - name: Terraform Init (Dev)
        working-directory: ./terraform/dev
        run: terraform init

      - name: Destroy Preview Terraform Deployment
        working-directory: ./terraform/dev
        run: |
          if terraform workspace list | grep -q "pr${{ steps.get_pr.outputs.pr_number }}"; then
            terraform workspace select pr${{ steps.get_pr.outputs.pr_number }}
            terraform destroy -auto-approve -no-color
            terraform workspace select default
            terraform workspace delete pr${{ steps.get_pr.outputs.pr_number }}
          fi

      - name: Terraform Init (Release)
        working-directory: ./terraform/release
        run: terraform init

      - name: Terraform Apply
        id: apply
        working-directory: ./terraform/release
        run: terraform apply -auto-approve -no-color

      - name: Publish Results to Step Summary
        if: always()
        run: |
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          # Terraform Production Deployment

          <details open>
          <summary>Terraform Apply: ${{ steps.apply.outcome == 'success' && '✅ Passed' || '❌ Failed' }}</summary>

          \`\`\`
          ${{ steps.apply.outputs.stdout }}
          \`\`\`

          </details>
          EOF
