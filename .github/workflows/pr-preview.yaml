name: "PR Preview Deployment"

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
  TF_IN_AUTOMATION: true

jobs:
  terraform:
    name: "Terraform PR Preview Deployment"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform/dev
    outputs:
      api_url: ${{ steps.terraform-outputs.outputs.api_url }}

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: 1.14.0

      - name: Terraform Init
        run: terraform init

      - name: Terraform Workspace
        run: terraform workspace select -or-create pr${{ github.event.number }}

      - name: Terraform Apply
        id: apply
        run: terraform apply -auto-approve -no-color

      - name: Get Terraform Outputs
        id: terraform-outputs
        run: echo "api_url=$(terraform output -raw api_url)" >> $GITHUB_OUTPUT

      - name: Publish Results to Step Summary
        if: always()
        run: |
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          # Terraform PR Preview Deployment

          <details open>
          <summary>Terraform Apply: ${{ steps.apply.outcome == 'success' && '✅ Passed' || '❌ Failed' }}</summary>

          \`\`\`
          ${{ steps.apply.outputs.stdout }}
          \`\`\`

          </details>
          EOF

  sst:
    name: "SST PR Preview Deployment"
    runs-on: ubuntu-latest
    needs: [terraform]
    defaults:
      run:
        working-directory: ./frontend

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 24

      - name: Install NPM Packages
        run: npm i

      - name: SST Deploy
        id: sst-deploy
        env:
          NEXT_PUBLIC_API_URL: ${{ needs.terraform.outputs.api_url }}
        run: npx sst deploy --stage pr${{ github.event.number }}

      - name: Publish Results to Step Summary
        if: always()
        run: |
          cat <<EOF >> $GITHUB_STEP_SUMMARY
          # SST PR Preview Deployment

          <details open>
          <summary>SST Deploy: ${{ steps.sst-deploy.outcome == 'success' && '✅ Passed' || '❌ Failed' }}</summary>

          \`\`\`
          ${{ steps.sst-deploy.outputs.stdout }}
          \`\`\`

          </details>
          EOF

  publish:
    name: "Publish PR Preview Results"
    runs-on: ubuntu-latest
    needs: [terraform, sst]
    if: ${{ always() }}

    permissions:
      pull-requests: write

    steps:
      - name: Add Comment to PR
        uses: actions/github-script@v8
        with:
          script: |
            const marker = "<!-- pr-preview -->";
            const runUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const body = `${marker}
            ## PR Preview Deployment for ${context.sha}

            **Deployment Status:** ${{ needs.terraform.result == 'success' && needs.sst.result == 'success' && '✅ All deployments succeeded' || '❌ One or more deployments failed' }}

            Please view test deployment here: https://dev.pr${{ github.event.number }}.laprogramucla.com
            To develop locally, set the NEXT_PUBLIC_API_URL environment variable to ${{ needs.terraform.outputs.api_url }}

            A full result of the deployment run is available in the workflow summary here: ${runUrl}
            `;

            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;

            const comments = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.data.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body
              });
            }
